<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | نظام الموارد البشرية</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f766e;
            --primary-light: #14b8a6;
            --primary-dark: #0d9488;
            --surface: #f0fdfa;
            --card-bg: #ffffff;
            --text: #134e4a;
            --text-muted: #5eead4;
            --border: rgba(20, 184, 166, 0.2);
            --shadow: 0 25px 50px -12px rgba(15, 118, 110, 0.15);
            --shadow-hover: 0 25px 50px -12px rgba(15, 118, 110, 0.25);
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            direction: rtl;
            font-family: 'IBM Plex Sans Arabic', 'Segoe UI', Tahoma, sans-serif;
            background: var(--surface);
            background-image:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(20, 184, 166, 0.25), transparent),
                radial-gradient(ellipse 60% 40% at 100% 50%, rgba(15, 118, 110, 0.12), transparent),
                radial-gradient(ellipse 60% 40% at 0% 50%, rgba(15, 118, 110, 0.12), transparent);
        }

        .login-wrapper {
            width: 100%;
            max-width: 420px;
            animation: fadeUp 0.5s ease-out;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card {
            background: var(--card-bg);
            padding: 2.5rem 2rem;
            border-radius: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: box-shadow 0.3s ease, transform 0.3s ease;
        }

        .login-card:hover {
            box-shadow: var(--shadow-hover);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 1rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            box-shadow: 0 8px 24px rgba(15, 118, 110, 0.3);
        }

        .login-card h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
            margin: 0 0 0.25rem;
            letter-spacing: -0.02em;
        }

        .login-card .subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: 500;
            margin: 0;
        }

        .form-label {
            font-weight: 600;
            color: var(--text);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .form-control {
            text-align: right;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            font-size: 1rem;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .form-control:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.2);
            outline: none;
        }

        .form-control::placeholder {
            color: #94a3b8;
        }

        .mb-3 {
            margin-bottom: 1.25rem;
        }

        .btn-login {
            width: 100%;
            padding: 0.875rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
            box-shadow: 0 4px 14px rgba(15, 118, 110, 0.4);
            margin-top: 0.5rem;
        }

        .btn-login:hover {
            opacity: 0.95;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(15, 118, 110, 0.45);
            color: #fff;
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .alert-danger {
            background: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
            border-radius: 12px;
            padding: 0.875rem 1rem;
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 1.25rem;
        }

        .footer-text {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">👤</div>
                <h1>نظام الموارد البشرية (HR System)</h1>
                <p class="subtitle">تسجيل دخول المسؤول</p>
            </div>

            {% if error %}
                <div class="alert alert-danger">
                    {{ error }}
                </div>
            {% endif %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label" for="username">اسم المسؤول</label>
                    <input type="text"
                           id="username"
                           class="form-control"
                           name="username"
                           placeholder="أدخل اسم المسؤول"
                           autocomplete="username"
                           required
                           autofocus>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="password">كلمة المرور</label>
                    <input type="password"
                           id="password"
                           class="form-control"
                           name="password"
                           placeholder="أدخل كلمة المرور"
                           autocomplete="current-password"
                           required>
                </div>

                <button type="submit" class="btn btn-login">
                    تسجيل الدخول
                </button>
            </form>

            <!-- رابط بوابة الموظف خارج تسجيل دخول المسؤول -->
            <div style="margin-top: 1rem; text-align: center;">
                <a href="{{ url_for('employee_login') }}" class="btn btn-outline-secondary btn-sm">
                    دخول بوابة الموظف
                </a>
            </div>
        </div>
        <p class="footer-text">نظام إدارة الموارد البشرية ©</p>
    </div>

</body>
</html>
