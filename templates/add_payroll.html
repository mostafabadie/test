{% extends "base.html" %}

{% block title %}إضافة راتب{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2 class="mb-4">➕ إضافة راتب</h2>

    <div class="mb-4 p-3 bg-light rounded border border-primary">
        <label class="form-label small text-muted fw-bold">🔍 بحث سريع:</label>
        <input type="text"
               id="employeeSearch"
               class="form-control form-control-lg"
               placeholder="اكتب الاسم أو البريد الإلكتروني للبحث..."
               autocomplete="off">
        <div class="form-text text-muted">سيتم تحديد الموظف تلقائياً عند المطابقة</div>
    </div>

    <form method="POST" class="p-4 border rounded shadow-sm bg-light">

        <div class="mb-3">
            <label class="form-label">الموظف:</label>
            <select name="employee_id" id="employeeSelect" class="form-select" required>
                <option value="">-- اختر الموظف --</option>
                {% for emp in employees %}
                <option value="{{ emp.id }}" data-name="{{ emp.name or '' }}" data-email="{{ emp.email or '' }}">
                    {{ emp.name }}{% if emp.email %} — {{ emp.email }}{% endif %}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">الراتب الأساسي:</label>
            <input type="number" step="0.01" name="salary" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">المكافآت:</label>
            <input type="number" step="0.01" name="bonus" class="form-control" value="0">
        </div>

        <div class="mb-3">
            <label class="form-label">الخصومات:</label>
            <input type="number" step="0.01" name="deductions" class="form-control" value="0">
        </div>

        <div class="mb-3">
            <label class="form-label">بنود إضافية (بدلات / خصومات):</label>
            <div class="border rounded bg-white p-3">
                <div id="itemsContainer"></div>
                <button type="button" class="btn btn-outline-secondary btn-sm mt-2" onclick="addPayrollItem()">
                    ➕ إضافة بند
                </button>
                <div class="form-text mt-2">مثال: بدل مواصلات (بدل) / خصم تأخير (خصم)</div>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">تاريخ الدفع:</label>
            <input type="date" name="payment_date" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">💾 حفظ</button>
    </form>

    <script>
        (function() {
            var searchInput = document.getElementById("employeeSearch");
            var select = document.getElementById("employeeSelect");
            if (!searchInput || !select) return;

            // Pre-cache employee data for fast filtering
            var employeeData = [];
            var options = select.querySelectorAll("option");
            options.forEach(function(opt) {
                if (opt.value !== "") {
                    employeeData.push({
                        element: opt,
                        name: (opt.getAttribute("data-name") || "").toLowerCase(),
                        email: (opt.getAttribute("data-email") || "").toLowerCase()
                    });
                }
            });

            var debounceTimer;

            // Fast filter with debouncing
            searchInput.addEventListener("input", function() {
                clearTimeout(debounceTimer);
                var q = (this.value || "").trim().toLowerCase();

                debounceTimer = setTimeout(function() {
                    var firstMatch = null;

                    employeeData.forEach(function(emp) {
                        var match = !q || emp.name.indexOf(q) !== -1 || emp.email.indexOf(q) !== -1;
                        emp.element.style.display = match ? "" : "none";
                        if (match && !firstMatch) firstMatch = emp;
                    });

                    // Auto-select first match for quick UX
                    if (firstMatch && q.length >= 2) {
                        select.value = firstMatch.element.value;
                        // Trigger salary fetch
                        fetchSalary(firstMatch.element.value);
                    } else if (!q) {
                        select.value = "";
                    }
                }, 100); // 100ms debounce
            });

            function fetchSalary(empId) {
                if (!empId) return;
                fetch("/get_salary/" + empId)
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        var salaryInput = document.querySelector("input[name='salary']");
                        if (salaryInput) salaryInput.value = data.salary != null ? data.salary : "";
                    });
            }

            select.addEventListener("change", function() {
                fetchSalary(this.value);
            });

            // إضافة بنود رواتب ديناميكية
            var itemsContainer = document.getElementById('itemsContainer');
            window.addPayrollItem = function() {
                if (!itemsContainer) return;
                var row = document.createElement('div');
                row.className = 'row g-2 align-items-center mb-2';
                row.innerHTML = `
                    <div class="col-md-3">
                        <select name="item_type[]" class="form-select form-select-sm">
                            <option value="allowance">بدل</option>
                            <option value="deduction">خصم</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <input name="item_label[]" class="form-control form-control-sm" placeholder="اسم البند (مثال: بدل مواصلات)">
                    </div>
                    <div class="col-md-2">
                        <input name="item_amount[]" type="number" step="0.01" class="form-control form-control-sm" placeholder="المبلغ">
                    </div>
                    <div class="col-md-1 text-center">
                        <button type="button" class="btn btn-outline-danger btn-sm" title="حذف" onclick="this.closest('.row').remove()">✖</button>
                    </div>
                `;
                itemsContainer.appendChild(row);
            };
            // بند افتراضي واحد
            addPayrollItem();
        })();
    </script>
</div>
{% endblock %}
